<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>书籍知识图谱可视化</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<style>
  :root {
    /* 色板：深蓝炭灰底 + 冷蓝主色 + 青色辅色，整体克制 */
    --bg: #0d1117; --bg-2: #11161f; --panel: #161c26; --panel-2: #1b2330;
    --border: #2a3340; --border-soft: #232c39;
    --text: #e6eaf0; --muted: #8b95a5; --faint: #5b6675;
    --accent: #4ea1ff; --accent-soft: rgba(78,161,255,.14); --accent2: #36cfc9;
    --danger: #ff7875; --ok: #95de64; --warn: #ffd666;
    --radius: 10px; --radius-sm: 7px;
    --shadow: 0 8px 28px rgba(0,0,0,.45);
    --shadow-sm: 0 2px 10px rgba(0,0,0,.35);
    --ring: 0 0 0 3px rgba(78,161,255,.22);
    --mono: "JetBrains Mono", "SFMono-Regular", "Consolas", "Menlo", monospace;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    color: var(--text);
    font-family: -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    font-size: 13px; line-height: 1.55;
    -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility;
    height: 100vh; display: flex; flex-direction: column;
    background:
      radial-gradient(1200px 700px at 18% -10%, rgba(78,161,255,.08), transparent 60%),
      radial-gradient(900px 600px at 100% 110%, rgba(54,207,201,.06), transparent 55%),
      var(--bg);
  }

  /* ---------- 滚动条 ---------- */
  *::-webkit-scrollbar { width: 9px; height: 9px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: #2c3644; border-radius: 9px; border: 2px solid transparent; background-clip: padding-box; }
  *::-webkit-scrollbar-thumb:hover { background: #3a4658; background-clip: padding-box; }

  /* ---------- 顶栏 ---------- */
  header {
    padding: 12px 20px;
    background: linear-gradient(180deg, rgba(27,35,48,.92), rgba(22,28,38,.92));
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(255,255,255,.02) inset, 0 6px 20px rgba(0,0,0,.25);
    display: flex; align-items: center; gap: 18px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  header h1 {
    font-size: 16px; font-weight: 650; white-space: nowrap;
    letter-spacing: .2px; display: flex; align-items: center; gap: 8px;
  }
  header h1 span {
    color: var(--accent);
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  }
  .controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  /* ---------- 输入 / 下拉 ---------- */
  .controls input, .controls select,
  #query-box input, #query-box select,
  #session-bar select {
    background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 7px 11px; font-size: 13px; outline: none;
    transition: border-color .15s, box-shadow .15s, background .15s;
  }
  .controls input:hover, .controls select:hover,
  #query-box input:hover, #query-box select:hover { border-color: #38445a; }
  .controls input:focus, .controls select:focus,
  #query-box input:focus, #query-box select:focus {
    border-color: var(--accent); box-shadow: var(--ring); background: var(--bg);
  }
  .controls input[type="text"] { width: 220px; }
  select {
    appearance: none; -webkit-appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path fill='%238b95a5' d='M0 0l5 6 5-6z'/></svg>");
    background-repeat: no-repeat; background-position: right 11px center; padding-right: 28px;
  }

  /* ---------- 按钮 ---------- */
  button {
    background: linear-gradient(180deg, #5aaeff, #3d92f7);
    color: #fff; border: 1px solid rgba(78,161,255,.5);
    border-radius: var(--radius-sm); padding: 7px 16px; font-size: 13px;
    font-weight: 500; cursor: pointer;
    box-shadow: 0 1px 0 rgba(255,255,255,.12) inset, 0 2px 8px rgba(78,161,255,.22);
    transition: transform .12s ease, box-shadow .15s, background .15s, opacity .15s;
  }
  button:hover { background: linear-gradient(180deg, #69b8ff, #4a9efb); box-shadow: 0 1px 0 rgba(255,255,255,.16) inset, 0 4px 14px rgba(78,161,255,.32); }
  button:active { transform: translateY(1px); }
  button:focus-visible { outline: none; box-shadow: var(--ring); }
  button:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }
  button.secondary {
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
    box-shadow: 0 1px 0 rgba(255,255,255,.03) inset;
  }
  button.secondary:hover { border-color: var(--accent); color: #fff; background: #20293a; box-shadow: var(--shadow-sm); }
  button.danger {
    background: linear-gradient(180deg, #ff8a87, #f5625e); border-color: rgba(255,120,117,.5);
    box-shadow: 0 1px 0 rgba(255,255,255,.12) inset, 0 2px 8px rgba(255,120,117,.22);
  }
  button.danger:hover { background: linear-gradient(180deg, #ff9d9a, #ff6f6b); }
  button.sm { padding: 4px 11px; font-size: 12px; border-radius: 6px; }

  /* ---------- 主体 ---------- */
  main { flex: 1; display: flex; overflow: hidden; min-height: 0; }
  #chart { flex: 1; height: 100%; min-width: 0; }
  #side {
    width: 360px; background: linear-gradient(180deg, var(--panel), #141a24);
    border-left: 1px solid var(--border); display: flex; flex-direction: column;
    flex-shrink: 0; overflow: hidden;
  }

  /* ---------- Tabs ---------- */
  .tabs {
    display: flex; border-bottom: 1px solid var(--border); flex-shrink: 0;
    background: rgba(13,17,23,.4);
  }
  .tab {
    flex: 1; padding: 11px 6px; text-align: center; cursor: pointer; font-size: 13px;
    color: var(--muted); border-bottom: 2px solid transparent;
    transition: color .15s, background .15s, border-color .15s;
    position: relative; user-select: none;
  }
  .tab:hover { color: var(--text); background: rgba(255,255,255,.02); }
  .tab.active {
    color: var(--accent); border-bottom-color: var(--accent);
    background: linear-gradient(180deg, transparent, rgba(78,161,255,.07));
  }
  .tab-pane { display: none; padding: 18px 16px; overflow-y: auto; flex: 1; }
  .tab-pane.active { display: block; animation: fade .18s ease; }
  @keyframes fade { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }

  #side h2 {
    font-size: 12px; font-weight: 600; color: var(--accent2);
    margin-bottom: 12px; letter-spacing: .8px; text-transform: uppercase;
  }
  .stat {
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 2px; border-bottom: 1px solid var(--border-soft); font-size: 13px;
  }
  .stat span:first-child { color: var(--muted); }
  .stat span:last-child { color: var(--text); font-weight: 600; font-variant-numeric: tabular-nums; }

  /* ---------- 节点详情 ---------- */
  .node-info { margin-top: 18px; }
  .node-info .name { font-size: 16px; font-weight: 650; margin-bottom: 6px; letter-spacing: .2px; }
  .node-info .label {
    display: inline-block; background: rgba(54,207,201,.12); color: var(--accent2);
    font-size: 11px; padding: 2px 9px; border-radius: 11px; margin-bottom: 8px;
    border: 1px solid rgba(54,207,201,.25); font-weight: 500;
  }
  .node-info .desc {
    font-size: 12px; color: var(--muted); line-height: 1.6; margin: 8px 0;
    max-height: 120px; overflow-y: auto; padding: 8px 10px;
    background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: var(--radius-sm);
  }
  .edge-list { margin-top: 8px; }
  .edge-item {
    padding: 9px 10px; margin: 6px 0; border: 1px solid var(--border-soft);
    border-radius: var(--radius-sm); font-size: 12px; cursor: pointer;
    background: var(--bg-2); transition: border-color .15s, transform .12s, color .15s;
  }
  .edge-item:hover { color: var(--accent); border-color: var(--accent); transform: translateX(2px); }
  .edge-item .type { color: var(--accent2); font-family: var(--mono); font-size: 11px; }
  .muted { color: var(--muted); font-size: 12px; }
  .empty {
    color: var(--faint); font-size: 13px; padding: 28px 12px; text-align: center;
    line-height: 1.7; border: 1px dashed var(--border-soft); border-radius: var(--radius);
    background: rgba(255,255,255,.015);
  }

  /* ---------- 图例 ---------- */
  .legend { display: flex; flex-wrap: wrap; gap: 7px; margin: 10px 0 16px; }
  .legend-item {
    display: flex; align-items: center; gap: 6px; font-size: 11px;
    padding: 4px 10px; background: var(--bg-2); border-radius: 12px; cursor: pointer;
    border: 1px solid var(--border-soft); transition: border-color .15s, background .15s, opacity .15s;
    user-select: none;
  }
  .legend-item:hover { border-color: #3a4658; background: #1a212c; }
  .legend-item.disabled { opacity: .35; text-decoration: line-through; }
  .legend-dot { width: 9px; height: 9px; border-radius: 50%; box-shadow: 0 0 6px currentColor; }

  /* ---------- 文档卡片 ---------- */
  .doc-item {
    padding: 12px; background: var(--bg-2); border: 1px solid var(--border-soft);
    border-radius: var(--radius); margin-bottom: 10px; font-size: 12px;
    transition: border-color .15s, box-shadow .15s;
  }
  .doc-item:hover { border-color: #38445a; box-shadow: var(--shadow-sm); }
  .doc-item .doc-name { font-weight: 650; font-size: 13px; margin-bottom: 5px; word-break: break-all; }
  .doc-item .doc-meta { color: var(--muted); margin-bottom: 9px; font-size: 11px; }
  .doc-item .doc-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .status-tag {
    font-size: 10px; padding: 1px 7px; border-radius: 9px; margin-left: 7px;
    font-weight: 600; letter-spacing: .3px; vertical-align: middle;
  }
  .status-tag.processed { background: rgba(149,222,100,.18); color: var(--ok); border: 1px solid rgba(149,222,100,.35); }
  .status-tag.failed { background: rgba(255,120,117,.18); color: var(--danger); border: 1px solid rgba(255,120,117,.35); }
  .status-tag.processing { background: var(--accent-soft); color: var(--accent); border: 1px solid rgba(78,161,255,.35); }

  /* ---------- Cypher ---------- */
  #cypher-input {
    width: 100%; min-height: 76px; background: var(--bg-2); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 10px;
    font-size: 12px; font-family: var(--mono); resize: vertical; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  #cypher-input:focus { border-color: var(--accent); box-shadow: var(--ring); }
  .cypher-table { width: 100%; border-collapse: collapse; font-size: 11px; margin-top: 12px; }
  .cypher-table th, .cypher-table td {
    border: 1px solid var(--border-soft); padding: 5px 7px; text-align: left;
    max-width: 120px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .cypher-table th { color: var(--accent2); background: var(--bg-2); font-weight: 600; }
  .cypher-table tbody tr:nth-child(even) { background: rgba(255,255,255,.015); }
  .cypher-table tbody tr:hover { background: rgba(78,161,255,.06); }

  /* ---------- 底部问答区 ---------- */
  #query-box {
    background: linear-gradient(180deg, rgba(22,28,38,.96), rgba(20,25,34,.96));
    backdrop-filter: blur(10px);
    border-top: 1px solid var(--border);
    padding: 12px 20px 14px; display: flex; flex-direction: column; gap: 10px;
    flex-shrink: 0; box-shadow: 0 -6px 20px rgba(0,0,0,.25);
  }
  #chat-log {
    max-height: 220px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px;
    padding: 2px 4px;
  }
  .msg {
    font-size: 13px; line-height: 1.65; padding: 9px 13px; border-radius: 12px;
    white-space: pre-wrap; word-break: break-word; position: relative;
    animation: msgin .18s ease;
  }
  @keyframes msgin { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  .msg.user {
    background: linear-gradient(180deg, #1f2837, #1a212c);
    align-self: flex-end; max-width: 80%;
    border: 1px solid var(--border); border-bottom-right-radius: 4px;
  }
  .msg.assistant {
    background: linear-gradient(180deg, rgba(78,161,255,.14), rgba(78,161,255,.09));
    align-self: flex-start; max-width: 88%;
    border: 1px solid rgba(78,161,255,.22); border-bottom-left-radius: 4px;
  }
  .msg .role { font-size: 10px; color: var(--muted); margin-bottom: 3px; letter-spacing: .3px; }
  .msg .content { color: var(--text); }
  .msg .refs {
    margin-top: 8px; font-size: 11px; color: var(--muted);
    border-top: 1px solid rgba(255,255,255,.06); padding-top: 5px;
  }
  .chat-input-row { display: flex; gap: 10px; align-items: center; }
  .chat-input-row input { flex: 1; }
  #session-bar { display: flex; gap: 8px; align-items: center; }
  #session-bar select { flex: 1; }

  /* ---------- Toast ---------- */
  #toast {
    position: fixed; top: 16px; right: 16px; z-index: 9999;
    display: flex; flex-direction: column; gap: 10px;
  }
  .toast {
    background: linear-gradient(180deg, rgba(27,35,48,.97), rgba(22,28,38,.97));
    backdrop-filter: blur(10px);
    border: 1px solid var(--border); border-left: 3px solid var(--accent);
    color: var(--text); padding: 11px 15px; border-radius: var(--radius-sm);
    font-size: 13px; max-width: 320px; box-shadow: var(--shadow);
    animation: slidein .22s cubic-bezier(.2,.7,.3,1);
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.ok { border-left-color: var(--ok); }
  @keyframes slidein { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

  /* ---------- 响应式 ---------- */
  @media (max-width: 900px) {
    #side { width: 300px; }
    .controls input[type="text"] { width: 150px; }
  }
  @media (max-width: 720px) {
    header { gap: 10px; }
    main { flex-direction: column; }
    #side { width: 100%; max-height: 45vh; border-left: none; border-top: 1px solid var(--border); }
    .controls input[type="text"] { width: 100%; }
  }
</style>
</head>
<body>
  <div id="toast"></div>
  <header>
    <h1>📚 <span>书籍知识图谱</span></h1>
    <div class="controls">
      <select id="book-select"><option value="">加载中…</option></select>
      <input type="text" id="entity-input" placeholder="输入实体名称（模糊）" />
      <select id="depth">
        <option value="1">1 跳</option>
        <option value="2" selected>2 跳</option>
        <option value="3">3 跳</option>
      </select>
      <button id="search-btn">🔍 查找子图</button>
      <button class="secondary" id="top-btn">热门实体</button>
      <button class="secondary" id="reset-btn">重置视图</button>
    </div>
  </header>

  <main>
    <div id="chart"></div>
    <aside id="side">
      <div class="tabs">
        <div class="tab active" data-tab="overview">图谱概览</div>
        <div class="tab" data-tab="docs">文档管理</div>
        <div class="tab" data-tab="cypher">Cypher</div>
        <div class="tab" data-tab="config">配置</div>
      </div>

      <div class="tab-pane active" id="pane-overview">
        <h2>统计</h2>
        <div class="stat"><span>当前画布节点</span><span id="stat-nodes">—</span></div>
        <div class="stat"><span>当前画布关系</span><span id="stat-edges">—</span></div>
        <div class="stat"><span>Neo4j 总节点</span><span id="stat-total">—</span></div>
        <div class="stat"><span>Neo4j 总关系</span><span id="stat-total-rel">—</span></div>
        <h2 style="margin-top:16px;">类型图例（点击过滤）</h2>
        <div class="legend" id="legend"></div>
        <div class="node-info" id="node-info">
          <p class="empty">点击节点查看详情<br/>或搜索一个实体开始</p>
        </div>
      </div>

      <div class="tab-pane" id="pane-docs">
        <h2>导入新书</h2>
        <div style="display:flex;gap:8px;margin-bottom:14px;">
          <input type="text" id="doc-file" placeholder="data/books 下文件名" style="flex:1;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:7px 11px;font-size:13px;" />
          <button class="secondary sm" id="doc-ingest">导入</button>
          <button class="secondary sm" id="doc-upsert">Upsert</button>
        </div>
        <div class="muted" style="margin-bottom:10px;">Upsert = 同名已存在则先删后导（用于更新内容）</div>
        <h2>已导入文档</h2>
        <div id="doc-list"></div>
      </div>

      <div class="tab-pane" id="pane-cypher">
        <h2>Cypher 查询（只读）</h2>
        <textarea id="cypher-input" placeholder="MATCH (n) RETURN labels(n)[0] AS label, count(*) AS cnt"></textarea>
        <div style="margin-top:8px;">
          <button class="secondary sm" id="cypher-run">▶ 执行</button>
          <span class="muted" id="cypher-status" style="margin-left:8px;"></span>
        </div>
        <div id="cypher-result"></div>
      </div>

      <div class="tab-pane" id="pane-config">
        <h2>配置</h2>
        <div class="muted" style="margin-bottom:10px;">敏感项（***）只读，走 .env。改值保存后需重启服务生效。</div>
        <div id="config-form"></div>
        <div style="margin-top:12px;">
          <button class="sm" id="config-save">💾 保存</button>
          <span class="muted" id="config-status" style="margin-left:8px;"></span>
        </div>
      </div>
    </aside>
  </main>

  <div id="query-box">
    <div id="session-bar">
      <button class="sm" id="s-new">＋ 新会话</button>
      <select id="s-select" title="历史会话"><option value="">（无）</option></select>
      <button class="sm secondary" id="s-del">🗑 删除</button>
    </div>
    <div id="chat-log"></div>
    <div class="chat-input-row">
      <select id="q-mode">
        <option value="hybrid">hybrid</option>
        <option value="local">local</option>
        <option value="global">global</option>
        <option value="naive">naive</option>
      </select>
      <input type="text" id="q-input" placeholder="基于当前书籍图谱提问…" />
      <button id="q-btn">💬 提问</button>
      <button class="secondary" id="q-clear">清空对话</button>
    </div>
  </div>

<script>
const API = ""; // 同源；跨域时填后端地址
const chart = echarts.init(document.getElementById("chart"), "dark");
let currentNodes = [], currentEdges = [], disabledLabels = new Set(), currentBook = "";

function currentBookOrWarn() {
  if (!currentBook) { toast("请先选择或导入一本书", "error"); return ""; }
  return currentBook;
}

// ---------- toast ----------
function toast(msg, kind = "") {
  const wrap = document.getElementById("toast");
  const t = document.createElement("div");
  t.className = "toast " + kind;
  t.textContent = msg;
  wrap.appendChild(t);
  setTimeout(() => { t.style.opacity = "0"; t.style.transition = "opacity .3s"; setTimeout(() => t.remove(), 300); }, 3500);
}

// ---------- 标签颜色 ----------
const PALETTE = ["#4ea1ff","#36cfc9","#ffd666","#ff9c6e","#b37feb","#5cdbd3","#ff85c0","#95de64","#ffc069"];
function colorFor(label) {
  let h = 0;
  for (const c of (label || "ENTITY")) h = (h * 31 + c.charCodeAt(0)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ---------- 渲染子图 ----------
function render(sub) {
  currentNodes = sub.nodes || [];
  currentEdges = sub.edges || [];
  document.getElementById("stat-nodes").textContent = currentNodes.length;
  document.getElementById("stat-edges").textContent = currentEdges.length;

  const visibleNodes = currentNodes.filter(n => !disabledLabels.has(n.label));
  const visibleIds = new Set(visibleNodes.map(n => n.id));
  const visibleEdges = currentEdges.filter(e => visibleIds.has(e.source) && visibleIds.has(e.target));

  const nodes = visibleNodes.map(n => {
    const c = colorFor(n.label);
    return {
      id: n.id, name: n.name || n.id,
      symbolSize: Math.min(60, (n.degree || 1) * 4 + 18),
      itemStyle: {
        color: c, borderColor: c, borderWidth: 0,
        shadowBlur: 10, shadowColor: c + "55",
      },
      label: {
        show: true, color: "#e6eaf0", fontSize: 12, fontWeight: 500,
        textBorderColor: "#0d1117", textBorderWidth: 2.5, position: "right",
      },
      raw: n,
    };
  });
  const links = visibleEdges.map(e => ({
    source: e.source, target: e.target,
    label: { show: false, formatter: e.type, fontSize: 10, color: "#8b95a5" },
    lineStyle: { color: "#3a4452", width: 1, curveness: 0.18, opacity: .85 },
    raw: e,
  }));

  chart.setOption({
    backgroundColor: "transparent",
    tooltip: {
      backgroundColor: "rgba(22,28,38,.96)",
      borderColor: "#2a3340", borderWidth: 1, padding: [8, 12],
      textStyle: { color: "#e6eaf0", fontSize: 12 },
      extraCssText: "backdrop-filter: blur(8px); border-radius: 8px; box-shadow: 0 8px 28px rgba(0,0,0,.45);",
      formatter: p => {
        if (p.dataType === "edge") {
          const e = p.data.raw;
          return `${e.type}<br/><span class="muted">${e.description || ""}</span>`;
        }

      }
    },
    series: [{
      type: "graph", layout: "force", roam: true, draggable: true,
      force: { repulsion: 240, edgeLength: [60, 170], gravity: 0.08, friction: 0.6 },
      emphasis: {
        focus: "adjacency",
        lineStyle: { width: 2.5, color: "#4ea1ff" },
        label: { show: true, fontSize: 13, fontWeight: 600 },

}

function showNodeInfo(n) {
  const edges = currentEdges.filter(e => e.source === n.id || e.target === n.id);
  const safeName = (n.name || "").replace(/'/g, "\\'");
  const html = `
    <div class="name">${n.name}</div>
    <span class="label">${n.label}</span>
    <div class="muted">度数: ${n.degree}　关联关系: ${edges.length}</div>
    ${n.description ? `<div class="desc">${n.description}</div>` : ""}
    <h2 style="margin-top:14px;">关联关系</h2>
    <div class="edge-list">
      ${edges.length ? edges.map(e => {
        const other = e.source === n.id ? e.target : e.source;
        const otherNode = currentNodes.find(x => x.id === other);
        const otherName = (otherNode ? otherNode.name : other).replace(/'/g, "\\'");
        return `<div class="edge-item" onclick="expandNode('${otherName}')">
          <span class="type">[${e.type}]</span> → ${otherNode ? otherNode.name : other}
          ${e.description ? `<div class="muted">${e.description}</div>` : ""}
        </div>`;
      }).join("") : '<p class="empty">无关联</p>'}
    </div>
    <button class="secondary" style="margin-top:12px;width:100%;" onclick="expandNode('${safeName}')">以「${n.name}」为中心展开</button>
  `;
  document.getElementById("node-info").innerHTML = html;
}

function renderLegend(counts) {

  const labels = Object.keys(counts);

async function pollTask(taskId, label) {
  // 轮询 /tasks/{id} 直到 done/failed；返回结果或抛错。
  while (true) {
    await new Promise(r => setTimeout(r, 2000));
    const r = await fetch(API + "/tasks/" + taskId);
    if (!r.ok) throw new Error("任务查询失败");
    const t = await r.json();
    if (t.status === "done") return t.result;
    if (t.status === "failed") throw new Error(t.error || "任务失败");
  }
}

async function ingestFile(upsert) {
  const file = document.getElementById("doc-file").value.trim();
  if (!file) { toast("请输入文件名", "error"); return; }
  const url = upsert ? "/documents/upsert" : "/ingest";
  toast(upsert ? "Upsert 中（可能需数十秒）…" : "导入中…");
  try {
    const r = await fetch(API + url, {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ file, max_chunks: null })
    });
    const data = await r.json();
    if (!r.ok) { toast((data.detail || "导入失败"), "error"); return; }
    if (data.task_id) {
      // 异步任务：轮询
      await pollTask(data.task_id, upsert ? "Upsert" : "导入");
    }
    toast((upsert ? "Upsert 完成" : "导入完成") + "：" + (file), "ok");
    await loadDocs();
    // 选中新导入的书并查看其图谱
    const sel = document.getElementById("book-select");
    if ([...sel.options].some(o => o.value === file)) { sel.value = file; onBookChange(); }
    else loadStats();
  } catch (e) { toast("导入失败：" + e, "error"); }
}

  try {

    for (const m of (s.messages || [])) {

      chatHistory.push({ role: m.role, content: m.content });

  try {
    const r = await fetch(API + `/sessions/${encodeURIComponent(currentSessionId)}?user_id=${encodeURIComponent(userId)}`, { method: "DELETE" });
    if (r.status === 204) {
      toast("会话已删除", "ok");
      currentSessionId = null; chatHistory = []; chatLog.innerHTML = "";
      await loadSessions();
    } else if (r.status === 404) { toast("会话不存在", "error"); await loadSessions(); }

function addMsg(role, content) {
  const div = document.createElement("div");
  div.className = "msg " + role;
  div.innerHTML = `<div class="role">${role === "user" ? "🧑 你" : "🤖 助手"}</div><div class="content"></div><div class="refs" style="display:none"></div>`;
  div.querySelector(".content").textContent = content;
  chatLog.appendChild(div);
  chatLog.scrollTop = chatLog.scrollHeight;
  return { content: div.querySelector(".content"), refs: div.querySelector(".refs") };
}

async function askQuestion() {
  const q = document.getElementById("q-input").value.trim();
  if (!q) return;
  const mode = document.getElementById("q-mode").value;
  const book = currentBookOrWarn(); if (!book) return;
  // 无当前会话则自动新建一个
  if (!currentSessionId) { if (!(await newSession())) return; }
  document.getElementById("q-input").value = "";

  addMsg("user", q);
  const els = addMsg("assistant", "");
  els.content.textContent = "思考中…";

  try {
    const resp = await fetch(API + "/chat", {
      method: "POST", headers: {"Content-Type": "application/json"},
      body: JSON.stringify({ question: q, mode, history: chatHistory, book, session_id: currentSessionId, user_id: userId })
    });
    if (!resp.ok) { els.content.textContent = "请求失败：" + resp.status; return; }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buf = "", answer = "", refs = [];
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split("\n");
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith("data: ")) continue;
        const evt = JSON.parse(line.slice(6));
        if (evt.type === "references") {
          refs = evt.content || [];
        } else if (evt.type === "token") {
          if (!answer) els.content.textContent = "";
          answer += evt.content;
          els.content.textContent = answer;
          chatLog.scrollTop = chatLog.scrollHeight;
        } else if (evt.type === "queue") {
          if (!answer) els.content.textContent = `⏳ 排队中，前方还有 ${evt.ahead} 个请求…`;
        } else if (evt.type === "ping") {
          /* SSE 心跳，忽略 */
        } else if (evt.type === "refuse") {
          els.content.textContent = "⚠️ " + evt.content; return;
        } else if (evt.type === "error") {
          els.content.textContent = "❌ " + evt.content; return;
        } else if (evt.type === "done") { break; }
      }
    }
    if (refs.length) {
      els.refs.style.display = "block";
      els.refs.innerHTML = "📎 出处：" + refs.map(r => r.file_path).filter((v,i,a)=>a.indexOf(v)===i).join(", ");
    }
    if (answer) {
      chatHistory.push({ role: "user", content: q });
      chatHistory.push({ role: "assistant", content: answer });
      if (chatHistory.length > 12) chatHistory = chatHistory.slice(-12);
      // 后端已持久化，刷新下拉标题
      loadSessions();
    }
  } catch (e) { els.content.textContent = "查询失败：" + e; }
}

  t.onclick = () => {
    document.querySelectorAll(".tab").forEach(x => x.classList.remove("active"));
    document.querySelectorAll(".tab-pane").forEach(x => x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("pane-" + t.dataset.tab).classList.add("active");
    if (t.dataset.tab === "docs") loadDocs();
    if (t.dataset.tab === "config") loadConfig();
  };
});

window.addEventListener("resize", () => chart.resize());

// 初始化：拉文档列表 → 填充书籍选择器 → 自动选第一本并加载其图谱
loadDocs();
// 加载该用户的历史会话列表
loadSessions();
</script>
</body>
</html>
