services:
  neo4j:
    image: neo4j:5.20
    container_name: bookgraph-neo4j
    ports:
      - "7474:7474"   # HTTP / Browser
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/bookgraph123
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: bookgraph-qdrant
    ports:
      - "16333:6333"   # HTTP / REST（宿主 16333 避开 Windows 保留端口段）
      - "16334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_data:
